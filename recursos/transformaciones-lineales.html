<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Transformaciones Lineales</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--panel:#0d1220;--card:#111828;--border:#1c2640;--gold:#d4a84b;--cyan:#3ac2f0;--red:#f07070;--green:#50dd90;--orange:#f59a4a;--violet:#a88cff;--text:#dce4f0;--muted:#64768a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;display:flex;flex-direction:column;}
header{flex-shrink:0;background:linear-gradient(90deg,#050810,#0d1626 60%,#07090f);border-bottom:1px solid var(--border);padding:.75rem 1.4rem;display:flex;align-items:center;gap:1rem;}
.logo{font-family:'Oswald',sans-serif;font-size:.68rem;letter-spacing:.35em;color:var(--gold);border:1px solid var(--gold);padding:.2rem .5rem;}
header h1{font-family:'Oswald',sans-serif;font-weight:300;font-size:1.4rem;letter-spacing:.08em;}
header h1 em{color:var(--gold);font-style:normal;}
.tab-bar{flex-shrink:0;display:flex;background:var(--panel);border-bottom:1px solid var(--border);}
.mode-tab{padding:.65rem 1.8rem;font-family:'Oswald',sans-serif;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;user-select:none;}
.mode-tab:hover{color:var(--text);}.mode-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{flex:1;display:flex;min-height:0;}
/* Left panel */
.left{width:285px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:.9rem .95rem 1.4rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.left::-webkit-scrollbar{width:4px;}.left::-webkit-scrollbar-thumb{background:var(--border);}
.stitle{font-family:'Oswald',sans-serif;font-size:.64rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:.4rem;margin-bottom:.7rem;}
.stitle::before{content:'';display:inline-block;width:3px;height:9px;background:var(--gold);border-radius:1px;}
/* Matrix input */
.mat-wrap{position:relative;padding:0 18px;margin-bottom:.8rem;}
.mat-wrap::before,.mat-wrap::after{content:'';position:absolute;top:0;bottom:0;width:8px;border:2px solid rgba(212,168,75,.6);}
.mat-wrap::before{left:4px;border-right:none;border-radius:3px 0 0 3px;}
.mat-wrap::after{right:4px;border-left:none;border-radius:0 3px 3px 0;}
.mat-grid{display:grid;gap:4px;}
.mat-grid.r2{grid-template-columns:1fr 1fr;}
.mat-grid.r3{grid-template-columns:1fr 1fr 1fr;}
.mat-cell{display:flex;flex-direction:column;gap:2px;align-items:center;}
.mat-lbl{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);}
.mat-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--gold);padding:.32rem .3rem;font-family:'JetBrains Mono',monospace;font-size:.88rem;text-align:center;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.mat-inp:focus{border-color:var(--gold);}
/* Sliders */
.sl-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.22rem;}
.sl-row .lbl{font-size:.78rem;color:var(--muted);flex:1;}
.sl-val{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--gold);min-width:28px;text-align:right;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;padding:0;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;border:none;}
select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:.42rem .55rem;font-family:'Oswald',sans-serif;font-size:.73rem;outline:none;cursor:pointer;-webkit-appearance:none;}
select:focus{border-color:var(--gold);}select option{background:var(--card);}
.chk{display:flex;align-items:center;gap:.45rem;margin-bottom:.32rem;font-size:.79rem;color:var(--muted);cursor:pointer;}
.chk input{accent-color:var(--gold);width:13px;height:13px;cursor:pointer;}
/* Buttons */
.btn-row{display:flex;gap:.4rem;margin-bottom:.4rem;}
.btn-gold{flex:1;padding:.55rem;background:var(--gold);color:var(--bg);border:none;border-radius:3px;font-family:'Oswald',sans-serif;font-weight:500;font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .17s;}
.btn-gold:hover{background:#e8c97a;}
.btn2{flex:1;padding:.55rem;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .17s;}
.btn2:hover{border-color:var(--gold);color:var(--gold);}
.btn2.active{color:var(--cyan);border-color:var(--cyan);}
/* Analysis */
.ana-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:.5rem .7rem;margin-bottom:.42rem;}
.ac-lbl{font-family:'Oswald',sans-serif;font-size:.56rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:.14rem;}
.ac-val{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--text);}
.det-big{text-align:center;padding:.7rem .4rem;margin-bottom:.5rem;}
.det-num{font-family:'JetBrains Mono',monospace;font-size:1.5rem;}
.det-lbl{font-family:'Oswald',sans-serif;font-size:.63rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.15rem;}
.type-badge{display:inline-block;padding:.2rem .65rem;border-radius:12px;font-family:'Oswald',sans-serif;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;}
.fbox{background:rgba(212,168,75,.04);border:1px solid rgba(212,168,75,.15);border-radius:4px;padding:.55rem .75rem;margin-bottom:.5rem;font-family:'JetBrains Mono',monospace;font-size:.69rem;color:var(--muted);line-height:1.9;}
.fbox .fk{color:var(--gold);}.fbox .fn{color:var(--cyan);}
/* Legend */
.leg{display:flex;align-items:center;gap:.35rem;font-size:.73rem;color:var(--muted);margin-bottom:.22rem;}
.leg-line{width:22px;height:2.5px;border-radius:2px;flex-shrink:0;}
/* Vis */
.vis{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative;}
.vis canvas{display:block;width:100%;height:100%;}
.vis-info{position:absolute;top:10px;left:10px;background:rgba(11,16,24,.82);border:1px solid var(--border);border-radius:5px;padding:.5rem .75rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);backdrop-filter:blur(4px);pointer-events:none;line-height:1.8;}
@media(max-width:768px){body{height:auto;overflow-y:auto;}.main{flex-direction:column;}.left{width:100%;border-right:none;border-bottom:1px solid var(--border);}.vis{flex:none;height:420px;}}
</style>
</head>
<body>
<header>
  <span class="logo">T</span>
  <h1>Simulador de <em>Transformaciones Lineales</em></h1>
</header>
<div class="tab-bar">
  <div class="mode-tab active" id="tab-r2" onclick="setMode('r2')">ℝ² — Plano</div>
  <div class="mode-tab" id="tab-r3" onclick="setMode('r3')">ℝ³ — Espacio</div>
</div>
<div class="main">

<!-- ═══ PANEL IZQUIERDO ═══ -->
<div class="left">

  <div class="stitle">Matriz de la Transformación</div>
  <div class="mat-wrap" id="mat-wrap">
    <div class="mat-grid r2" id="mat-grid"></div>
  </div>

  <div style="margin-bottom:.7rem">
    <div class="sl-row">
      <span class="lbl">Interpolación <em style="color:var(--text)">t</em></span>
      <span class="sl-val" id="disp-t">1.00</span>
    </div>
    <input type="range" id="sl-t" min="0" max="1" step="0.01" value="1" oninput="onSliderT()">
  </div>

  <div class="btn-row">
    <button class="btn-gold" id="btn-anim" onclick="toggleAnim()">⟳ Animar (0→1)</button>
    <button class="btn2" onclick="rewind()">◀ t = 0</button>
  </div>
  <div class="btn-row">
    <button class="btn2" onclick="setIdentity()">I Identidad</button>
    <button class="btn2" onclick="resetCurves()">✕ Reset</button>
  </div>

  <div style="margin-bottom:.75rem;margin-top:.3rem">
    <div class="stitle">Presets</div>
    <select id="sel-preset" onchange="applyPreset()">
      <option value="">— Seleccionar —</option>
    </select>
  </div>

  <div class="stitle">Opciones</div>
  <label class="chk"><input type="checkbox" id="chk-grid" checked oninput="draw()">Grid transformado</label>
  <label class="chk"><input type="checkbox" id="chk-det" checked oninput="draw()">Paralelogramo / det</label>
  <label class="chk"><input type="checkbox" id="chk-eig" checked oninput="draw()">Eigenvectores (ℝ²)</label>
  <label class="chk"><input type="checkbox" id="chk-bear" checked oninput="draw()">Figura (oso)</label>

  <div class="stitle" style="margin-top:.65rem">Análisis</div>
  <div id="analysis"><div style="color:var(--muted);font-style:italic;font-size:.85rem">Ingresa la matriz…</div></div>

  <div class="stitle" style="margin-top:.65rem">Leyenda</div>
  <div class="leg"><span class="leg-line" style="background:rgba(58,194,240,.6)"></span>Grid transformado</div>
  <div class="leg"><span class="leg-line" style="background:var(--red)"></span>T(e₁) imagen de e₁</div>
  <div class="leg"><span class="leg-line" style="background:var(--green)"></span>T(e₂) / T(e₃)</div>
  <div class="leg"><span class="leg-line" style="background:var(--gold)"></span>Paralelogramo (det)</div>
  <div class="leg"><span class="leg-line" style="background:var(--violet)"></span>Eigenvectores</div>
</div>

<!-- ═══ CANVAS ═══ -->
<div class="vis" id="vis">
  <canvas id="cv2d" style="position:absolute;inset:0;display:block"></canvas>
  <canvas id="cv3d" style="position:absolute;inset:0;display:none"></canvas>
  <div class="vis-info" id="vis-info"></div>
</div>

</div><!-- /main -->
<script>
'use strict';
// ══════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════
let mode = 'r2';
let M2 = [[1,0],[0,1]];
let M3 = [[1,0,0],[0,1,0],[0,0,1]];
let animT = 1.0;
let animating = false;
let lastRAF = null;

// ══════════════════════════════════════
//  ÁLGEBRA LINEAL
// ══════════════════════════════════════
const mul2=(M,v)=>[M[0][0]*v[0]+M[0][1]*v[1],M[1][0]*v[0]+M[1][1]*v[1]];
const mul3=(M,v)=>[M[0][0]*v[0]+M[0][1]*v[1]+M[0][2]*v[2],M[1][0]*v[0]+M[1][1]*v[1]+M[1][2]*v[2],M[2][0]*v[0]+M[2][1]*v[1]+M[2][2]*v[2]];
const det2=M=>M[0][0]*M[1][1]-M[0][1]*M[1][0];
const det3=M=>{const[a,b,c]=[M[0][0],M[0][1],M[0][2]],[[,d,e],[,f,g]]=[M[1],M[2]].map(r=>[...r]);return M[0][0]*(M[1][1]*M[2][2]-M[1][2]*M[2][1])-M[0][1]*(M[1][0]*M[2][2]-M[1][2]*M[2][0])+M[0][2]*(M[1][0]*M[2][1]-M[1][1]*M[2][0]);};
const trace=M=>M.reduce((s,r,i)=>s+r[i],0);
const add2=(a,b)=>[a[0]+b[0],a[1]+b[1]];
const add3=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const norm2=v=>Math.sqrt(v[0]*v[0]+v[1]*v[1]);
const norm3=v=>Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);

// Interpolate: M(t) = (1-t)*I + t*M
function interp(M,t){
  return M.map((row,i)=>row.map((v,j)=>((i===j?1:0))*(1-t)+v*t));
}

// 2×2 eigenvalues (analytical)
function eigen2(M){
  const tr=M[0][0]+M[1][1], de=det2(M);
  const disc=tr*tr-4*de;
  if(disc<0){
    const re=tr/2, im=Math.sqrt(-disc)/2;
    return [{re,im},{re,im:-im}];
  }
  const l1=(tr+Math.sqrt(disc))/2, l2=(tr-Math.sqrt(disc))/2;
  return [{re:l1,im:0},{re:l2,im:0}];
}

// Eigenvector for real eigenvalue (2×2)
function eigvec2(M,lam){
  const a=M[0][0]-lam, b=M[0][1];
  const c=M[1][0],     d=M[1][1]-lam;
  let v;
  if(Math.abs(b)>1e-10) v=[-b,a];
  else if(Math.abs(c)>1e-10) v=[d,-c];
  else v=[1,0];
  const n=norm2(v)||1;
  return [v[0]/n,v[1]/n];
}

// 3×3 trace of 2×2 minors (for characteristic poly)
function traceMinors3(M){
  return (M[1][1]*M[2][2]-M[1][2]*M[2][1])
        +(M[0][0]*M[2][2]-M[0][2]*M[2][0])
        +(M[0][0]*M[1][1]-M[0][1]*M[1][0]);
}

// 3×3 characteristic polynomial: λ³ - tr·λ² + trMin·λ - det = 0
// Newton's method to find real roots
function eigenvalues3(M){
  const tr=trace(M), tm=traceMinors3(M), de=det3(M);
  const p=(lam)=>lam**3-tr*lam**2+tm*lam-de;
  const dp=(lam)=>3*lam**2-2*tr*lam+tm;
  const roots=[];
  for(const x0 of[-5,-1,0,1,5,tr/3]){
    let x=x0;
    for(let i=0;i<60;i++){const d=dp(x);if(Math.abs(d)<1e-14)break;x-=p(x)/d;}
    if(Math.abs(p(x))<0.01&&!roots.some(r=>Math.abs(r-x)<0.05)) roots.push(+x.toFixed(6));
  }
  return roots;
}

// Helper: hex + alpha → rgba string
function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Classification
function classify2(M){
  const de=det2(M), tr=trace(M), eps=1e-6;
  if(Math.abs(de)<eps) return{label:'Singular / Proyección',hex:'#f59a4a',rank:Math.abs(tr)>eps?1:0};
  const [a,b,c,d]=[M[0][0],M[0][1],M[1][0],M[1][1]];
  const c1n=Math.sqrt(a*a+c*c), c2n=Math.sqrt(b*b+d*d), dot=a*b+c*d;
  const isOrth=Math.abs(c1n-1)<.05&&Math.abs(c2n-1)<.05&&Math.abs(dot)<.05;
  if(isOrth){
    if(Math.abs(de-1)<.05) return{label:'Rotación (det=+1)',hex:'#3ac2f0',rank:2};
    if(Math.abs(de+1)<.05) return{label:'Reflexión (det=−1)',hex:'#a88cff',rank:2};
  }
  if(Math.abs(b)<eps&&Math.abs(c)<eps) return{label:Math.abs(a-d)<eps?'Escalado uniforme':'Escalado no uniforme',hex:'#50dd90',rank:2};
  if(Math.abs(a-1)<eps&&Math.abs(d-1)<eps&&Math.abs(de-1)<.05){
    if(Math.abs(c)<eps) return{label:`Corte horiz. (shear, k=${b.toFixed(2)})`,hex:'#50dd90',rank:2};
    if(Math.abs(b)<eps) return{label:`Corte vert. (shear, k=${c.toFixed(2)})`,hex:'#50dd90',rank:2};
  }
  if(de>0) return{label:'TL invertible (det>0)',hex:'#50dd90',rank:2};
  return{label:'TL con reflexión (det<0)',hex:'#f07070',rank:2};
}

// ══════════════════════════════════════
//  UI: MATRIX GRID
// ══════════════════════════════════════
function buildMatrixGrid(){
  const n=mode==='r2'?2:3;
  const wrap=document.getElementById('mat-wrap');
  const grid=document.getElementById('mat-grid');
  grid.className=`mat-grid ${mode}`;
  grid.innerHTML='';
  const M=mode==='r2'?M2:M3;
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const cell=document.createElement('div');
    cell.className='mat-cell';
    const lbl=document.createElement('span');
    lbl.className='mat-lbl'; lbl.textContent=`a${i+1}${j+1}`;
    const inp=document.createElement('input');
    inp.type='number'; inp.className='mat-inp'; inp.step='0.01';
    inp.value=M[i][j]; inp.dataset.i=i; inp.dataset.j=j;
    inp.addEventListener('input',()=>{ applyMatrix(); draw(); });
    cell.appendChild(lbl); cell.appendChild(inp);
    grid.appendChild(cell);
  }
}

function readMatrix(){
  const n=mode==='r2'?2:3;
  const M=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>0));
  document.querySelectorAll('.mat-inp').forEach(inp=>{
    const i=+inp.dataset.i,j=+inp.dataset.j;
    M[i][j]=+inp.value||0;
  });
  return M;
}

function setMatrixInputs(M){
  document.querySelectorAll('.mat-inp').forEach(inp=>{
    const i=+inp.dataset.i,j=+inp.dataset.j;
    inp.value=M[i][j];
  });
}

function applyMatrix(){
  if(mode==='r2') M2=readMatrix();
  else M3=readMatrix();
  updateAnalysis();
}

function setIdentity(){
  const n=mode==='r2'?2:3;
  const I=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i===j?1:0));
  setMatrixInputs(I);
  if(mode==='r2') M2=I; else M3=I;
  updateAnalysis(); draw();
}

// ══════════════════════════════════════
//  PRESETS
// ══════════════════════════════════════
const PRESETS2=[
  {label:'Rotación 45°', M:[[Math.cos(Math.PI/4),-Math.sin(Math.PI/4)],[Math.sin(Math.PI/4),Math.cos(Math.PI/4)]]},
  {label:'Rotación 90°', M:[[0,-1],[1,0]]},
  {label:'Rotación 180°', M:[[-1,0],[0,-1]]},
  {label:'Reflexión eje X', M:[[1,0],[0,-1]]},
  {label:'Reflexión eje Y', M:[[-1,0],[0,1]]},
  {label:'Reflexión y=x', M:[[0,1],[1,0]]},
  {label:'Corte horizontal (k=1)', M:[[1,1],[0,1]]},
  {label:'Corte vertical (k=1)', M:[[1,0],[1,1]]},
  {label:'Escalado ×2', M:[[2,0],[0,2]]},
  {label:'Escalado no uniforme', M:[[3,0],[0,1]]},
  {label:'Compresión X (proyección)', M:[[1,0],[0,0]]},
  {label:'Expansión + rotación', M:[[2,-1],[1,2]]},
  {label:'det = 0 (colapso)', M:[[1,2],[2,4]]},
  {label:'det = −1 (reflexión)', M:[[0.6,0.8],[0.8,-0.6]]},
];
const PRESETS3=[
  {label:'Rotación eje Z 45°', M:[[Math.cos(Math.PI/4),-Math.sin(Math.PI/4),0],[Math.sin(Math.PI/4),Math.cos(Math.PI/4),0],[0,0,1]]},
  {label:'Rotación eje X 90°', M:[[1,0,0],[0,0,-1],[0,1,0]]},
  {label:'Rotación eje Y 90°', M:[[0,0,1],[0,1,0],[-1,0,0]]},
  {label:'Reflexión plano XY', M:[[1,0,0],[0,1,0],[0,0,-1]]},
  {label:'Reflexión plano YZ', M:[[-1,0,0],[0,1,0],[0,0,1]]},
  {label:'Escalado ×2', M:[[2,0,0],[0,2,0],[0,0,2]]},
  {label:'Compresión eje Z', M:[[1,0,0],[0,1,0],[0,0,0.5]]},
  {label:'Corte XY (shear)', M:[[1,0,0],[0,1,0],[0.5,0.5,1]]},
  {label:'Proyección plano XY', M:[[1,0,0],[0,1,0],[0,0,0]]},
  {label:'Expansión anisótropa', M:[[3,0,0],[0,1,0],[0,0,0.5]]},
];

function buildPresets(){
  const sel=document.getElementById('sel-preset');
  sel.innerHTML='<option value="">— Seleccionar —</option>';
  const list=mode==='r2'?PRESETS2:PRESETS3;
  list.forEach((p,i)=>{
    const opt=document.createElement('option'); opt.value=i; opt.textContent=p.label; sel.appendChild(opt);
  });
}

function applyPreset(){
  const idx=+document.getElementById('sel-preset').value;
  const list=mode==='r2'?PRESETS2:PRESETS3;
  if(isNaN(idx)||!list[idx]) return;
  const Mraw=list[idx].M;
  const M=Mraw.map(r=>r.map(v=>+v.toFixed(5)));
  setMatrixInputs(M);
  if(mode==='r2') M2=M; else M3=M;
  document.getElementById('sl-t').value=1; animT=1;
  document.getElementById('disp-t').textContent='1.00';
  updateAnalysis(); draw();
}

// ══════════════════════════════════════
//  ANÁLISIS PANEL
// ══════════════════════════════════════
function updateAnalysis(){
  const M=mode==='r2'?M2:M3;
  const de=mode==='r2'?det2(M):det3(M);
  const tr=trace(M);
  const cls=mode==='r2'
    ?classify2(M)
    :{label:'Transformación en ℝ³',hex:'#3ac2f0',rank:Math.abs(de)>1e-9?3:2};
  const deRaw = Math.abs(de)>0.01 ? (de>0?'#50dd90':'#f07070') : '#f59a4a';
  const deBg  = Math.abs(de)>0.01 ? (de>0?'rgba(80,221,144,.07)':'rgba(240,112,112,.07)') : 'rgba(245,154,74,.07)';

  let eigenHTML='';
  if(mode==='r2'){
    const evs=eigen2(M);
    const disc=tr*tr-4*de;
    if(disc>=0){
      eigenHTML=evs.map((e,i)=>`λ${i+1} = ${e.re.toFixed(4)}`).join('<br>');
    } else {
      eigenHTML=`λ = ${evs[0].re.toFixed(3)} ± ${evs[0].im.toFixed(3)}i<br><span style="color:var(--orange)">Complejas (sin eig. reales)</span>`;
    }
  } else {
    const roots=eigenvalues3(M);
    eigenHTML=roots.length?roots.map((r,i)=>`λ${i+1} ≈ ${r}`).join('<br>'):'— (complejos o numérico)';
  }

  const t=animT;
  const Mt=interp(M,t);
  const detT=mode==='r2'?det2(Mt):det3(Mt);

  document.getElementById('analysis').innerHTML=`
<div style="border:2px solid ${deRaw};border-radius:6px;background:${deBg};padding:.75rem .6rem;margin-bottom:.6rem;text-align:center">
  <div style="font-family:'JetBrains Mono',monospace;font-size:1.45rem;color:${deRaw};font-weight:500">${de.toFixed(5)}</div>
  <div style="font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:.2rem 0">det(T) = ${mode==='r2'?'Escala de Área':'Escala de Volumen'}</div>
  <div style="font-size:.73rem;color:${deRaw};margin-top:.25rem">${Math.abs(de)<1e-9?'⚠ Singular: colapsa dimensión':de>0?'✓ Preserva orientación':'⊗ Invierte orientación'}</div>
</div>
<div style="text-align:center;margin-bottom:.55rem">
  <span class="type-badge" style="background:${hexRgba(cls.hex,.14)};color:${cls.hex};border:1px solid ${hexRgba(cls.hex,.45)}">${cls.label}</span>
</div>
<div class="fbox">
  <span class="fk">tr(T) = </span><span class="fn">${tr.toFixed(5)}</span><br>
  <span class="fk">det(T) = </span><span class="fn" style="color:${deRaw}">${de.toFixed(5)}</span><br>
  <span class="fk">rank = </span><span class="fn">${cls.rank||'—'}</span><br>
  <span class="fk">det(T·t=${t.toFixed(2)}) = </span><span class="fn" style="color:${deRaw}">${detT.toFixed(4)}</span>
</div>
<div class="ana-card"><div class="ac-lbl">Eigenvalores</div><div class="ac-val" style="font-size:.78rem;line-height:1.7">${eigenHTML}</div></div>
<div class="ana-card"><div class="ac-lbl">T(e₁) → columna 1</div><div class="ac-val" style="color:var(--red)">[${M.map(r=>r[0].toFixed(3)).join(', ')}]</div></div>
<div class="ana-card"><div class="ac-lbl">T(e₂) → columna 2</div><div class="ac-val" style="color:var(--green)">[${M.map(r=>r[1].toFixed(3)).join(', ')}]</div></div>
${mode==='r3'?`<div class="ana-card"><div class="ac-lbl">T(e₃) → columna 3</div><div class="ac-val" style="color:var(--cyan)">[${M.map(r=>r[2].toFixed(3)).join(', ')}]</div></div>`:''}`;
}

const COLORS2D={grid:'rgba(28,38,64,.55)',gridT:'rgba(58,194,240,.45)',e1:'#f07070',e2:'#50dd90',det:'rgba(212,168,75,.25)',detStroke:'rgba(212,168,75,.75)',eig:'#a88cff'};
let S2=60, OX=0, OY=0; // scale and origin for 2D

function to2D(p){return[OX+p[0]*S2,OY-p[1]*S2];}
function drawArrow2D(ctx,from,to,color,lw=2,label=''){
  const [x1,y1]=to2D(from),[x2,y2]=to2D(to);
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  if(len<3) return;
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const hl=Math.min(10,len*.35),hw=4;
  const ux=dx/len,uy=dy/len;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hl*ux+hw*uy,y2-hl*uy-hw*ux);
  ctx.lineTo(x2-hl*ux-hw*uy,y2-hl*uy+hw*ux);
  ctx.closePath();ctx.fill();
  if(label){ctx.font='bold 11px Oswald,sans-serif';ctx.textAlign='center';
    ctx.fillStyle=color;ctx.fillText(label,x2+ux*14,y2+uy*14-3);}
}

function drawShape2D(ctx,pts,fill,stroke,lw,Mt,isLine){
  const tpts=pts.map(p=>{const tp=mul2(Mt,p);return to2D(tp);});
  ctx.beginPath();
  ctx.moveTo(tpts[0][0],tpts[0][1]);
  for(let i=1;i<tpts.length;i++) ctx.lineTo(tpts[i][0],tpts[i][1]);
  if(!isLine) ctx.closePath();
  if(fill&&fill!=='none'){ctx.fillStyle=fill;ctx.fill();}
  if(stroke&&stroke!=='none'&&lw>0){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function draw2D(){
  const cv=document.getElementById('cv2d');
  const wrap=document.getElementById('vis');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  S2=Math.min(W,H)/12; OX=W/2; OY=H/2;

  // Background
  ctx.fillStyle='#07090f';ctx.fillRect(0,0,W,H);

  const Mt=interp(M2,animT);

  // ── Cuadrícula original de referencia (siempre visible, muy difuminada) ──
  ctx.strokeStyle='rgba(40,55,85,.55)'; ctx.lineWidth=1;
  for(let k=-8;k<=8;k++){
    const [x1,y1a]=to2D([k,-8.5]);const [,y1b]=to2D([k,8.5]);
    ctx.beginPath();ctx.moveTo(x1,y1a);ctx.lineTo(x1,y1b);ctx.stroke();
    const [xa,y2]=to2D([-8.5,k]);const [xb,]=to2D([8.5,k]);
    ctx.beginPath();ctx.moveTo(xa,y2);ctx.lineTo(xb,y2);ctx.stroke();
  }
  // Ejes originales más visibles
  ctx.strokeStyle='rgba(70,100,140,.65)'; ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(to2D([-8.5,0])[0],to2D([-8.5,0])[1]);ctx.lineTo(to2D([8.5,0])[0],to2D([8.5,0])[1]);ctx.stroke();
  ctx.beginPath();ctx.moveTo(to2D([0,-8.5])[0],to2D([0,-8.5])[1]);ctx.lineTo(to2D([0,8.5])[0],to2D([0,8.5])[1]);ctx.stroke();

  // Grid transformed (más brillante, con intensidad según animT)
  if(document.getElementById('chk-grid').checked){
    const alpha=(0.3+animT*0.35).toFixed(2);
    ctx.strokeStyle=`rgba(58,194,240,${alpha})`; ctx.lineWidth=1.3;
    for(let k=-7;k<=7;k++){
      const p1=mul2(Mt,[k,-8.5]),p2=mul2(Mt,[k,8.5]);
      const q1=mul2(Mt,[-8.5,k]),q2=mul2(Mt,[8.5,k]);
      const[x1,y1]=to2D(p1),[x2,y2]=to2D(p2);
      const[x3,y3]=to2D(q1),[x4,y4]=to2D(q2);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x3,y3);ctx.lineTo(x4,y4);ctx.stroke();
    }
    // Ejes transformados (más gruesos)
    ctx.strokeStyle=`rgba(58,194,240,${(+alpha+0.25).toFixed(2)})`; ctx.lineWidth=2.2;
    const axi1=to2D(mul2(Mt,[-8.5,0])),axi2=to2D(mul2(Mt,[8.5,0]));
    const ayi1=to2D(mul2(Mt,[0,-8.5])),ayi2=to2D(mul2(Mt,[0,8.5]));
    ctx.beginPath();ctx.moveTo(axi1[0],axi1[1]);ctx.lineTo(axi2[0],axi2[1]);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ayi1[0],ayi1[1]);ctx.lineTo(ayi2[0],ayi2[1]);ctx.stroke();
  }

  // Axes
  const x0=to2D([0,0]),xR=to2D([8,0]),xL=to2D([-8,0]),yT=to2D([0,8]),yB=to2D([0,-8]);
  ctx.strokeStyle='rgba(100,118,138,.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(xL[0],xL[1]);ctx.lineTo(xR[0],xR[1]);ctx.stroke();
  ctx.beginPath();ctx.moveTo(yB[0],yB[1]);ctx.lineTo(yT[0],yT[1]);ctx.stroke();
  ctx.fillStyle='rgba(100,118,138,.6)';ctx.font='11px JetBrains Mono,monospace';
  ctx.textAlign='center';ctx.fillText('x',xR[0]-6,xR[1]+13);
  ctx.textAlign='left';ctx.fillText('y',yT[0]+5,yT[1]+10);
  // Etiquetas de ejes originales — prominentes
  ctx.font='bold 14px Oswald,sans-serif'; ctx.textAlign='center';
  ctx.fillStyle='rgba(212,168,75,.85)';
  ctx.fillText('x', xR[0]-8, OY+16);
  ctx.textAlign='left';
  ctx.fillText('y', OX+6, yT[1]+14);
  // Números de escala
  for(let xi=-5;xi<=5;xi++){
    if(xi===0) continue;
    const [cx,cy]=to2D([xi,0]);
    ctx.fillStyle='rgba(100,118,138,.45)';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='center';
    ctx.fillText(xi,cx,OY+13);
  }
  for(let yi=-4;yi<=4;yi++){
    if(yi===0) continue;
    const [cx,cy]=to2D([0,yi]);
    ctx.fillStyle='rgba(100,118,138,.45)';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText(yi,OX-6,cy+4);
  }

  // Parallelogram (det visualization)
  if(document.getElementById('chk-det').checked){
    const de=det2(Mt);
    const ppts=[[0,0],[1,0],[1,1],[0,1]].map(p=>to2D(mul2(Mt,p)));
    const detColor=Math.abs(de)<.02?'rgba(245,154,74,.2)':de>0?'rgba(80,221,144,.18)':'rgba(240,112,112,.18)';
    const detStroke=Math.abs(de)<.02?'rgba(245,154,74,.7)':de>0?'rgba(80,221,144,.65)':'rgba(240,112,112,.65)';
    ctx.beginPath();ctx.moveTo(ppts[0][0],ppts[0][1]);
    ppts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();
    ctx.fillStyle=detColor;ctx.fill();
    ctx.strokeStyle=detStroke;ctx.lineWidth=2;ctx.setLineDash(Math.abs(de)<.02?[4,4]:[]);ctx.stroke();ctx.setLineDash([]);
    // Label
    const midX=(ppts[0][0]+ppts[1][0]+ppts[2][0]+ppts[3][0])/4;
    const midY=(ppts[0][1]+ppts[1][1]+ppts[2][1]+ppts[3][1])/4;
    ctx.fillStyle=detStroke;ctx.font='bold 11px JetBrains Mono,monospace';ctx.textAlign='center';
    ctx.fillText(`|det|=${Math.abs(de).toFixed(3)}`,midX,midY);
  }

  // Original bear (ghost)
  if(document.getElementById('chk-bear').checked){
    BEAR_PARTS.forEach(p=>{
      drawShape2D(ctx,p.pts,
        p.fill?.replace(/[\d.]+\)$/,'.18)'), p.stroke?.replace(/[\d.]+\)$/,'.12)'),
        p.lw,[[1,0],[0,1]],p.isLine);
    });
  }

  // Transformed bear
  if(document.getElementById('chk-bear').checked){
    BEAR_PARTS.forEach(p=>drawShape2D(ctx,p.pts,p.fill,p.stroke,p.lw,Mt,p.isLine));
  }

  // Basis vectors: original (white) + transformed (colored)
  drawArrow2D(ctx,[0,0],[1,0],'rgba(255,255,255,.25)',1.5,'e₁');
  drawArrow2D(ctx,[0,0],[0,1],'rgba(255,255,255,.25)',1.5,'e₂');
  const Te1=mul2(Mt,[1,0]),Te2=mul2(Mt,[0,1]);
  drawArrow2D(ctx,[0,0],Te1,COLORS2D.e1,2.5,`T(e₁)`);
  drawArrow2D(ctx,[0,0],Te2,COLORS2D.e2,2.5,`T(e₂)`);

  // Eigenvectors
  if(document.getElementById('chk-eig').checked){
    const eigs=eigen2(M2);
    const tr=trace(M2),de=det2(M2),disc=tr*tr-4*de;
    if(disc>=0){
      eigs.forEach((e,i)=>{
        if(!isFinite(e.re)) return;
        const v=eigvec2(M2,e.re);
        const scale=Math.min(3,Math.max(1,Math.abs(e.re)));
        const vEnd=[v[0]*scale,v[1]*scale];
        const vNeg=[-v[0]*scale,-v[1]*scale];
        const col=e.re>0?COLORS2D.eig:`rgba(168,140,255,.7)`;
        ctx.setLineDash([5,5]);
        drawArrow2D(ctx,vNeg,vEnd,col,2,`λ${i+1}=${e.re.toFixed(2)}`);
        ctx.setLineDash([]);
      });
    }
  }

  // Info overlay
  const de=det2(Mt);
  document.getElementById('vis-info').innerHTML=
    `t = ${animT.toFixed(2)} &nbsp;|&nbsp; det = ${de.toFixed(4)} &nbsp;|&nbsp; <span style="color:${de>0.01?'var(--green)':de<-0.01?'var(--red)':'var(--orange)'}">${Math.abs(de)<0.01?'SINGULAR':de>0?'Preserva orient.':'Invierte orient.'}</span>`;
}

function makeBear3DGroup(opacity){
  const g=new THREE.Group();
  BEAR3D.forEach(({p,r,c})=>{
    const geo=new THREE.SphereGeometry(r,12,10);
    const mat=new THREE.MeshPhongMaterial({color:c,transparent:opacity<1,opacity});
    const m=new THREE.Mesh(geo,mat);
    m.position.set(p[0],p[1],p[2]);
    g.add(m);
  });
  return g;
}

function makeParallelMesh(){
  paraGeo=new THREE.BufferGeometry();
  paraMesh=new THREE.Mesh(paraGeo,new THREE.MeshPhongMaterial({
    color:0xd4a84b,transparent:true,opacity:.30,side:THREE.DoubleSide,depthWrite:false}));
  const edgeGeo=new THREE.BufferGeometry();
  paraEdges=new THREE.LineSegments(edgeGeo,new THREE.LineBasicMaterial({color:0xd4a84b,opacity:.75,transparent:true}));
  scene.add(paraMesh);scene.add(paraEdges);
}

function updateParallel(Mt){
  const c1=Mt.map(r=>r[0]),c2=Mt.map(r=>r[1]),c3=Mt.map(r=>r[2]);
  const add=(a,b)=>a.map((v,i)=>v+b[i]);
  const O=[0,0,0];
  const v=[O,c1,c2,add(c1,c2),c3,add(c1,c3),add(c2,c3),add(add(c1,c2),c3)];
  // 12 triangles
  const fi=[0,1,3,0,3,2, 4,6,7,4,7,5, 0,1,5,0,5,4, 2,3,7,2,7,6, 0,2,6,0,6,4, 1,3,7,1,7,5];
  const pos=[];fi.forEach(i=>pos.push(...v[i]));
  paraGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  paraGeo.computeVertexNormals();paraGeo.attributes.position.needsUpdate=true;
  // Edges: 12 edges of the parallelepiped
  const ei=[[0,1],[0,2],[0,4],[1,3],[1,5],[2,3],[2,6],[3,7],[4,5],[4,6],[5,7],[6,7]];
  const epos=[];ei.forEach(([a,b])=>{epos.push(...v[a],...v[b]);});
  paraEdges.geometry.setAttribute('position',new THREE.Float32BufferAttribute(epos,3));
  paraEdges.geometry.attributes.position.needsUpdate=true;
}

function makeArrow3D(dir,color,len=1.5){
  const g=new THREE.Group();
  const d=new THREE.Vector3(...dir).normalize();
  const cylGeo=new THREE.CylinderGeometry(.035,.035,len*.85,10);
  const coneGeo=new THREE.ConeGeometry(.09,.15*len,10);
  const mat=new THREE.MeshPhongMaterial({color});
  const cyl=new THREE.Mesh(cylGeo,mat);
  const cone=new THREE.Mesh(coneGeo,mat);
  cyl.position.set(0,len*.425,0);cone.position.set(0,len*.925,0);
  g.add(cyl);g.add(cone);
  // Rotate from Y to dir
  const yAxis=new THREE.Vector3(0,1,0);
  const q=new THREE.Quaternion().setFromUnitVectors(yAxis,d);
  g.setRotationFromQuaternion(q);
  return g;
}

function updateBasisArrows(Mt){
  basisArrows.forEach(a=>scene.remove(a));
  basisArrows=[];
  const cols=[Mt.map(r=>r[0]),Mt.map(r=>r[1]),Mt.map(r=>r[2])];
  const colors=[0xf07070,0x50dd90,0x3ac2f0];
  cols.forEach((c,i)=>{
    const len=Math.sqrt(c[0]*c[0]+c[1]*c[1]+c[2]*c[2])||0.01;
    if(len<0.05) return;
    const arr=makeArrow3D(c,colors[i],len);
    scene.add(arr); basisArrows.push(arr);
  });
}

function initScene3D(){

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,.1,200);
  scene.add(new THREE.AmbientLight(0xffffff,.45));
  const dl=new THREE.DirectionalLight(0xffffff,.9);dl.position.set(5,8,5);scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x8888ff,.4);dl2.position.set(-5,-3,-5);scene.add(dl2);

  // Grid (floor XZ)
  const gridH=new THREE.GridHelper(12,12,0x1c2640,0x1c2640);gridH.position.y=-2.5;scene.add(gridH);

  // Función para crear etiquetas de ejes como sprites
  function makeAxisLabel(text, color){
    const c=document.createElement('canvas'); c.width=96; c.height=96;
    const ctx2=c.getContext('2d');
    ctx2.clearRect(0,0,96,96);
    ctx2.font='bold 62px Arial,sans-serif';
    ctx2.fillStyle=color;
    ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.fillText(text,48,52);
    const tex=new THREE.CanvasTexture(c);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
    const spr=new THREE.Sprite(mat); spr.scale.set(0.65,0.65,1);
    return spr;
  }

  // Etiquetas X (rojo), Y (verde), Z (cian)
  const lx=makeAxisLabel('x','#f07070'); lx.position.set(4.6,0.05,0); scene.add(lx);
  const ly=makeAxisLabel('y','#50dd90'); ly.position.set(0.1,4.6,0);  scene.add(ly);
  const lz=makeAxisLabel('z','#3ac2f0'); lz.position.set(0,0.05,4.6); scene.add(lz);

  // Axes
  const axMat=new THREE.LineBasicMaterial({vertexColors:true});
  const axPts=[0,0,0,4,0,0, 0,0,0,0,4,0, 0,0,0,0,0,4];
  const axCol=[1,.3,.3, 1,.3,.3, .3,1,.3, .3,1,.3, .3,.4,1, .3,.4,1];
  const axGeo=new THREE.BufferGeometry();
  axGeo.setAttribute('position',new THREE.Float32BufferAttribute(axPts,3));
  axGeo.setAttribute('color',new THREE.Float32BufferAttribute(axCol,3));
  scene.add(new THREE.LineSegments(axGeo,axMat));

  // Bear original (ghost)
  bear3dOrig=makeBear3DGroup(.12);
  scene.add(bear3dOrig);

  // Bear transformed
  bear3dT=makeBear3DGroup(1);
  bear3dT.matrixAutoUpdate=false;
  scene.add(bear3dT);

  // Parallelepiped
  makeParallelMesh();

  // Original unit cube wireframe
  const uGeo=new THREE.BoxGeometry(1,1,1);
  const uEdge=new THREE.EdgesGeometry(uGeo);
  const uLine=new THREE.LineSegments(uEdge,new THREE.LineBasicMaterial({color:0x2a3e58,opacity:.6,transparent:true}));
  uLine.position.set(.5,.5,.5);
  scene.add(uLine);

  updateCamera3D();
}

function updateCamera3D(){
  if(!camera) return;
  const x=camR*Math.sin(camPhi)*Math.sin(camTheta);
  const y=camR*Math.cos(camPhi);
  const z=camR*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.set(x,y,z);camera.lookAt(0,0,0);
}

function draw3D(){
  if(!renderer) return;
  const Mt=interp(M3,animT);

  // Visibilidad según checkboxes
  const showDet  = document.getElementById('chk-det').checked;
  const showBear = document.getElementById('chk-bear').checked;
  if(paraMesh)  paraMesh.visible  = showDet;
  if(paraEdges) paraEdges.visible = showDet;
  if(bear3dT)   bear3dT.visible   = showBear;

  // Update bear
  const m4=new THREE.Matrix4().set(
    Mt[0][0],Mt[0][1],Mt[0][2],0,
    Mt[1][0],Mt[1][1],Mt[1][2],0,
    Mt[2][0],Mt[2][1],Mt[2][2],0,
    0,0,0,1
  );
  bear3dT.matrix.copy(m4);

  updateParallel(Mt);
  updateBasisArrows(Mt);

  const de=det3(Mt);
  document.getElementById('vis-info').innerHTML=
    `t=${animT.toFixed(2)} | det=${de.toFixed(4)} | <span style="color:${de>0.01?'var(--green)':de<-0.01?'var(--red)':'var(--orange)'}">${Math.abs(de)<.01?'SINGULAR':de>0?'Preserva vol.':'Invierte vol.'}</span><br>
     <span style="color:var(--muted);font-size:.65rem">Arrastrar=rotar · Rueda=zoom</span>`;

  // Resize
  const wrap=document.getElementById('vis');
  if(renderer.domElement.width!==wrap.clientWidth||renderer.domElement.height!==wrap.clientHeight){
    renderer.setSize(wrap.clientWidth,wrap.clientHeight);
    camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
  }

  renderer.render(scene,camera);
}

// 3D mouse controls
function setup3DMouse(){
  const cv=document.getElementById('cv3d');
  cv.addEventListener('mousedown',e=>{isDragging=true;dragX=e.clientX;dragY=e.clientY;});
  cv.addEventListener('mouseup',()=>isDragging=false);
  cv.addEventListener('mousemove',e=>{
    if(!isDragging) return;
    camTheta+=(e.clientX-dragX)*.012;camPhi-=(e.clientY-dragY)*.012;
    camPhi=Math.max(.15,Math.min(Math.PI-.15,camPhi));
    dragX=e.clientX;dragY=e.clientY;updateCamera3D();
  });
  cv.addEventListener('wheel',e=>{
    e.preventDefault();camR=Math.max(3,Math.min(25,camR+e.deltaY*.02));updateCamera3D();
  },{passive:false});
  // Touch
  let touchX=0,touchY=0,pinchD=0;
  cv.addEventListener('touchstart',e=>{e.preventDefault();
    if(e.touches.length===1){touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;}
    else pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();
    if(e.touches.length===1){
      camTheta+=(e.touches[0].clientX-touchX)*.014;camPhi-=(e.touches[0].clientY-touchY)*.014;
      camPhi=Math.max(.15,Math.min(Math.PI-.15,camPhi));
      touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;updateCamera3D();
    } else {
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      camR=Math.max(3,Math.min(25,camR+(pinchD-d)*.05));pinchD=d;updateCamera3D();
    }
  },{passive:false});
}

// ══════════════════════════════════════
//  MAIN DRAW + ANIMACIÓN (solo 0→1)
// ══════════════════════════════════════
function draw(){
  if(mode==='r2') draw2D();
  else draw3D();
}

function mainLoop(){
  if(animating){
    animT = Math.min(1, animT + 0.007);
    document.getElementById('sl-t').value = animT;
    document.getElementById('disp-t').textContent = animT.toFixed(2);
    updateAnalysis();
    if(animT >= 1){
      animating = false;
      document.getElementById('btn-anim').textContent='⟳ Animar (0→1)';
      document.getElementById('btn-anim').style.background='var(--gold)';
    }
  }
  draw();
  requestAnimationFrame(mainLoop);
}
let spd3=1;

// ══════════════════════════════════════
//  CONTROL FUNCTIONS
// ══════════════════════════════════════
function setMode(m){
  mode=m;
  ['r2','r3'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===m));
  document.getElementById('cv2d').style.display=m==='r2'?'block':'none';
  document.getElementById('cv3d').style.display=m==='r3'?'block':'none';
  buildMatrixGrid();buildPresets();applyMatrix();
  if(m==='r3'&&!renderer){initScene3D();setup3DMouse();}
  draw();
}

function onSliderT(){
  animT=+document.getElementById('sl-t').value;
  document.getElementById('disp-t').textContent=animT.toFixed(2);
  updateAnalysis();draw();
}

function toggleAnim(){
  if(animating){
    animating=false;
    document.getElementById('btn-anim').textContent='⟳ Animar (0→1)';
    document.getElementById('btn-anim').style.background='var(--gold)';
  } else {
    animT=0;
    document.getElementById('sl-t').value=0;
    document.getElementById('disp-t').textContent='0.00';
    animating=true;
    document.getElementById('btn-anim').textContent='■ Detener';
    document.getElementById('btn-anim').style.background='var(--orange)';
    updateAnalysis();
  }
}

function rewind(){
  animating=false;
  animT=0;
  document.getElementById('sl-t').value=0;
  document.getElementById('disp-t').textContent='0.00';
  document.getElementById('btn-anim').textContent='⟳ Animar (0→1)';
  document.getElementById('btn-anim').style.background='var(--gold)';
  updateAnalysis();draw();
}

function resetCurves(){
  animating=false;
  animT=1;
  document.getElementById('sl-t').value=1;
  document.getElementById('disp-t').textContent='1.00';
  document.getElementById('btn-anim').textContent='⟳ Animar (0→1)';
  document.getElementById('btn-anim').style.background='var(--gold)';
  updateAnalysis();draw();
}

// ══════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════
new ResizeObserver(()=>{
  draw();
  if(renderer){
    const wrap=document.getElementById('vis');
    renderer.setSize(wrap.clientWidth,wrap.clientHeight);
    camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();
  }
}).observe(document.getElementById('vis'));

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
window.addEventListener('load',()=>{
  buildMatrixGrid();buildPresets();updateAnalysis();
  mainLoop();
});
</script>
