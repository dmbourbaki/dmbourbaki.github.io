<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OMAI-Quiz — Estudiante</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<style>
  :root {
    --void: #08090c; --abyss: #0f1116; --panel: #15181f;
    --gold: #c9a04d; --gold-bright: #e8c273;
    --cyan: #4dc9c9; --rose: #c96b7a; --grass: #7ac97a; --violet: #9a7ac9;
    --good: #7ac97a; --bad: #c96b6b;
    --line: #262b36; --line-soft: #1b1e27;
    --ink: #eceef2; --ink-soft: #a7acb9; --ink-faint: #6b7080;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--void); color: var(--ink);
    font-family: "Inter Tight", sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; padding-top: 60px;
  }
  #barra-sala {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 8px; font-family: "Spline Sans Mono", monospace; font-size: 14px; color: var(--gold-bright);
  }
  #barra-sala b { font-size: 17px; letter-spacing: 0.08em; margin-left: 6px; }
  .eyebrow {
    font-family: "Spline Sans Mono", monospace; font-size: 11px; letter-spacing: 0.12em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 8px; text-align: center;
  }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 28px; max-width: 420px; width: 100%; text-align: center; }
  input {
    width: 100%; padding: 14px; font-size: 18px; border-radius: 10px;
    border: 1px solid var(--line-soft); background: var(--abyss); color: var(--ink);
    margin: 12px 0; font-family: "Inter Tight", sans-serif;
  }
  .btn { width: 100%; font-weight: 600; font-size: 17px; background: var(--gold); color: var(--void); border: none; border-radius: 10px; padding: 16px; cursor: pointer; }
  .btn:disabled { background: var(--line); color: var(--ink-faint); }
  .puntos-actuales { font-family: "Spline Sans Mono", monospace; color: var(--gold-bright); font-size: 14px; }
  .pregunta-texto { font-family: "Fraunces", serif; font-size: 21px; margin: 14px 0; color: var(--ink); }
  .pregunta-imagen { max-width: 100%; max-height: 200px; border-radius: 10px; margin: 10px 0; }
  .opciones-col { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .opcion-btn { padding: 22px 16px; border-radius: 12px; font-size: 17px; font-weight: 500; border: none; color: #08090c; cursor: pointer; text-align: left; }
  .opcion-btn:nth-child(1) { background: var(--cyan); }
  .opcion-btn:nth-child(2) { background: var(--rose); }
  .opcion-btn:nth-child(3) { background: var(--grass); }
  .opcion-btn:nth-child(4) { background: var(--violet); }
  .opcion-btn:disabled { opacity: 0.4; }
  .opcion-btn.elegida { outline: 4px solid var(--gold-bright); }
  .estado-msg { color: var(--ink-soft); margin-top: 20px; }
  .resultado-correcta { color: var(--good); font-size: 20px; font-weight: 600; }
  .resultado-incorrecta { color: var(--bad); font-size: 20px; font-weight: 600; }
</style>
</head>
<body>
  <div id="barra-sala">Sala: <b id="barra-codigo"></b></div>
  <div class="eyebrow">OMAI-Quiz</div>

  <div class="card" id="vista-unirse">
    <p>Ingresa el código de la sala y tu nombre. Puedes entrar en cualquier momento, aunque el quiz ya haya empezado.</p>
    <input id="input-codigo" placeholder="Código (ej. AB12)" maxlength="4" style="text-transform:uppercase" />
    <input id="input-nombre" placeholder="Tu nombre" maxlength="24" />
    <button class="btn" id="btn-unirse">Entrar</button>
    <p class="estado-msg" id="mensaje-error"></p>
  </div>

  <div class="card" id="vista-esperando" style="display:none;">
    <p>¡Listo, <b id="nombre-mostrado"></b>! Esperando a que el profesor inicie o avance el quiz…</p>
  </div>

  <div class="card" id="vista-pregunta" style="display:none;">
    <div class="eyebrow" id="contador-pregunta"></div>
    <div class="pregunta-texto" id="texto-pregunta"></div>
    <img id="pregunta-imagen" class="pregunta-imagen" style="display:none;" />
    <div class="opciones-col" id="opciones-col"></div>
  </div>

  <div class="card" id="vista-resultado" style="display:none;">
    <div id="resultado-texto"></div>
    <p class="puntos-actuales" id="puntos-totales"></p>
    <p class="estado-msg">Esperando la siguiente pregunta…</p>
  </div>

  <div class="card" id="vista-final" style="display:none;">
    <h2 style="font-family:'Fraunces',serif;color:var(--gold-bright);">Quiz terminado</h2>
    <p class="puntos-actuales" id="puntos-finales"></p>
    <p id="posicion-final" style="color:var(--ink-soft)"></p>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { ESTADOS, unirseASala, enviarRespuesta, escucharSala, ranking } from "./omai-quiz-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC7na99rI4Yb-9_IrszvByRaBIu14wOF2A",
    authDomain: "omai-quiz.firebaseapp.com",
    databaseURL: "https://omai-quiz-default-rtdb.firebaseio.com",
    projectId: "omai-quiz",
    storageBucket: "omai-quiz.firebasestorage.app",
    messagingSenderId: "44663231333",
    appId: "1:44663231333:web:4467c56d21bca45a82878c",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let codigoSala = null;
  let jugadorId = null;
  let idxPreguntaMostrada = -1;
  let inicioPreguntaServidor = null;
  let yaRespondio = false;

  const params = new URLSearchParams(location.search);
  if (params.get("sala")) {
    document.getElementById("input-codigo").value = params.get("sala").toUpperCase();
  }

  function renderizarKatex(el) {
    if (window.renderMathInElement) {
      window.renderMathInElement(el, {
        delimiters: [{ left: "$$", right: "$$", display: true }, { left: "$", right: "$", display: false }],
        throwOnError: false,
      });
    }
  }

  document.getElementById("btn-unirse").onclick = async () => {
    const codigo = document.getElementById("input-codigo").value.trim().toUpperCase();
    const nombre = document.getElementById("input-nombre").value.trim();
    const errorEl = document.getElementById("mensaje-error");
    errorEl.textContent = "";
    if (!codigo || !nombre) { errorEl.textContent = "Completa el código y tu nombre."; return; }
    try {
      jugadorId = await unirseASala(db, codigo, nombre);
      codigoSala = codigo;
      document.getElementById("nombre-mostrado").textContent = nombre;
      document.getElementById("barra-codigo").textContent = codigo;
      document.getElementById("barra-sala").style.display = "flex";
      mostrarVista("vista-esperando");
      escucharSala(db, codigoSala, renderizar);
    } catch (e) {
      errorEl.textContent = e.message;
    }
  };

  function renderizar(sala) {
    if (!sala) return;
    if (sala.estado === ESTADOS.PREGUNTA_ACTIVA) {
      if (sala.preguntaActual !== idxPreguntaMostrada) {
        idxPreguntaMostrada = sala.preguntaActual;
        yaRespondio = false;
        inicioPreguntaServidor = sala.inicioPregunta || Date.now();
        mostrarPregunta(sala);
      }
    }
    if (sala.estado === ESTADOS.RESULTADOS) mostrarResultado(sala);
    if (sala.estado === ESTADOS.TERMINADO) {
      const rankingFinal = ranking(sala);
      const posicion = rankingFinal.findIndex((j) => j.id === jugadorId) + 1;
      const yo = rankingFinal.find((j) => j.id === jugadorId);
      document.getElementById("puntos-finales").textContent = `${yo?.puntos ?? 0} puntos`;
      document.getElementById("posicion-final").textContent = posicion > 0 ? `Puesto ${posicion} de ${rankingFinal.length}` : "";
      mostrarVista("vista-final");
    }
  }

  let ordenOpcionesActual = [0, 1, 2, 3];

  function mezclarOrdenOpciones() {
    const orden = [0, 1, 2, 3];
    for (let i = orden.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [orden[i], orden[j]] = [orden[j], orden[i]];
    }
    return orden;
  }

  function mostrarPregunta(sala) {
    mostrarVista("vista-pregunta");
    const p = sala.preguntas[sala.preguntaActual];
    document.getElementById("contador-pregunta").textContent = `Pregunta ${sala.preguntaActual + 1} de ${sala.preguntas.length}`;
    document.getElementById("texto-pregunta").textContent = p.texto;
    const imgEl = document.getElementById("pregunta-imagen");
    if (p.imagen) { imgEl.src = p.imagen; imgEl.style.display = "block"; } else { imgEl.style.display = "none"; }

    // Cada estudiante ve las opciones en un orden aleatorio propio, para evitar copia.
    ordenOpcionesActual = mezclarOrdenOpciones();

    const cont = document.getElementById("opciones-col");
    cont.innerHTML = "";
    ordenOpcionesActual.forEach((indiceReal, posicionLocal) => {
      const btn = document.createElement("button");
      btn.className = "opcion-btn";
      btn.textContent = p.opciones[indiceReal];
      btn.onclick = () => responder(indiceReal, btn);
      cont.appendChild(btn);
    });
    renderizarKatex(document.getElementById("vista-pregunta"));
  }

  async function responder(opcionIdx, btnEl) {
    if (yaRespondio) return;
    yaRespondio = true;
    document.querySelectorAll(".opcion-btn").forEach((b) => (b.disabled = true));
    btnEl.classList.add("elegida");
    const tiempoSegundos = (Date.now() - inicioPreguntaServidor) / 1000;
    try {
      await enviarRespuesta(db, codigoSala, idxPreguntaMostrada, jugadorId, opcionIdx, tiempoSegundos);
    } catch (e) { /* doble click: se ignora */ }
  }

  function mostrarResultado(sala) {
    mostrarVista("vista-resultado");
    const idx = sala.preguntaActual;
    const respuestaJugador = (sala.respuestas[idx] || {})[jugadorId];
    const pregunta = sala.preguntas[idx];
    const el = document.getElementById("resultado-texto");

    if (!respuestaJugador) {
      el.innerHTML = `<span class="resultado-incorrecta">No respondiste a tiempo</span>`;
    } else if (respuestaJugador.opcion === pregunta.correcta) {
      el.innerHTML = `<span class="resultado-correcta">¡Correcto! ✓</span>`;
    } else {
      el.innerHTML = `<span class="resultado-incorrecta">Incorrecto ✗</span><br/><small>Era: <span id="resp-correcta"></span></small>`;
    }
    const miPuntaje = (sala.jugadores[jugadorId] || {}).puntos || 0;
    document.getElementById("puntos-totales").textContent = `${miPuntaje} puntos totales`;
    renderizarKatex(el);
    const spanCorrecta = document.getElementById("resp-correcta");
    if (spanCorrecta) {
      spanCorrecta.textContent = pregunta.opciones[pregunta.correcta];
      renderizarKatex(spanCorrecta);
    }
  }

  function mostrarVista(id) {
    ["vista-unirse", "vista-esperando", "vista-pregunta", "vista-resultado", "vista-final"]
      .forEach((v) => document.getElementById(v).style.display = v === id ? "block" : "none");
  }
</script>
</body>
</html>
